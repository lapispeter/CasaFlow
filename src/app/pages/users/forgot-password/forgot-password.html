<div class="login-page">

  <!-- BAL OLDAL -->
  <div class="login-left">
    <div class="brand">
      <img src="/images/logo.png" alt="CasaFlow logo" class="brand-logo" />
      <h1 class="brand-title">CasaFlow</h1>
      <p class="brand-subtitle">Digitális háztartásmenedzser</p>
    </div>
  </div>

  <!-- JOBB OLDAL -->
  <div class="login-right">
    <div class="login-card">

      <h2 class="login-title">Elfelejtett jelszó</h2>

      <p class="helper">
        Add meg az email címedet, és küldünk egy jelszó-visszaállító linket.
      </p>

      <form (ngSubmit)="onSubmit()" class="login-form">

        <div class="form-group">
          <label>Email cím</label>
          <input
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="hello@casaflow.com"
            autocomplete="email"
            required
          />
        </div>

        <button
          type="submit"
          class="login-button"
          [disabled]="isSubmitting"
        >
          {{ isSubmitting ? 'Küldés...' : 'Jelszó-visszaállító email küldése' }}
        </button>

      </form>

      <p class="message error" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>

      <p class="message success" *ngIf="successMessage">
        {{ successMessage }}
      </p>

      <div class="back-to-login">
        <a routerLink="/login">Vissza a belépéshez</a>
      </div>

    </div>
  </div>

</div>
