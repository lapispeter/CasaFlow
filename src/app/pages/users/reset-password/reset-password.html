<div class="login-page">

  <!-- BAL OLDAL -->
  <div class="login-left">
    <div class="brand">
      <img src="/images/logo.png" alt="CasaFlow logo" class="brand-logo" />
      <h1 class="brand-title">CasaFlow</h1>
      <p class="brand-subtitle">Digitális háztartásmenedzser</p>
    </div>
  </div>

  <!-- JOBB OLDAL -->
  <div class="login-right">
    <div class="login-card">

      <h2 class="login-title">Új jelszó beállítása</h2>

      <!-- Token hiba -->
      <p class="token-error" *ngIf="!token">
        Hiányzó vagy érvénytelen token az URL-ben.
      </p>

      <!-- Form csak akkor, ha van token -->
      <form *ngIf="token" (ngSubmit)="onSubmit()" class="login-form">

        <div class="form-group">
          <label>Új jelszó</label>
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            placeholder="••••••"
            required
          />
        </div>

        <div class="form-group">
          <label>Új jelszó megerősítése</label>
          <input
            type="password"
            name="passwordConfirmation"
            [(ngModel)]="passwordConfirmation"
            placeholder="••••••"
            required
          />
        </div>

        <button
          type="submit"
          class="login-button"
          [disabled]="isSubmitting"
        >
          {{ isSubmitting ? 'Mentés...' : 'Jelszó módosítása' }}
        </button>

      </form>

      <!-- Üzenetek -->
      <p class="message error" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>

      <p class="message success" *ngIf="successMessage">
        {{ successMessage }}
      </p>

      <div class="back-to-login">
        <a routerLink="/login">Vissza a belépéshez</a>
      </div>

    </div>
  </div>

</div>
