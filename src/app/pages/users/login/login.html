
<div class="login-page">

  <!-- BAL OLDAL -->
  <div class="login-left">
    <div class="brand">
      <img src="/images/logo.png" alt="CasaFlow logo" class="brand-logo" />
      <h1 class="brand-title">CasaFlow</h1>
      <p class="brand-subtitle">Digitális háztartásmenedzser</p>
    </div>
  </div>

  <!-- JOBB OLDAL -->
  <div class="login-right">
    <div class="login-card">

      <h2 class="login-title">Bejelentkezés</h2>

      <p class="login-register">
        Nincs még fiókod?
        <a routerLink="/register">Hozz létre egyet itt!</a>
      </p>

      <form (ngSubmit)="onLogin()" class="login-form">

        <div class="form-group">
          <label>E-mail</label>
          <input
            type="email"
            name="username"
            [(ngModel)]="username"
            placeholder="hello@casaflow.com"
            required
          />
        </div>

        <div class="form-group">
          <label>Jelszó</label>
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            placeholder="••••••"
            required
          />
        </div>

        <button type="submit" class="login-button">
          Bejelentkezés
        </button>

      </form>

      <div class="forgot-password">
        <a routerLink="/forgot-password">Elfelejtetted a jelszavad?</a>
      </div>

    </div>
  </div>

</div>
