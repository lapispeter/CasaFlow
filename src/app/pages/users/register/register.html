<div class="login-page">

  <!-- BAL OLDAL -->
  <div class="login-left">
    <div class="brand">
      <img src="/images/logo.png" alt="CasaFlow logo" class="brand-logo" />
      <h1 class="brand-title">CasaFlow</h1>
      <p class="brand-subtitle">Digitális háztartásmenedzser</p>
    </div>
  </div>

  <!-- JOBB OLDAL -->
  <div class="login-right">
    <div class="login-card">

      <h2 class="login-title">Regisztráció</h2>

      <p class="helper">
        Hozd létre a fiókodat, hogy el tudd kezdeni a CasaFlow használatát.
      </p>

      <form (ngSubmit)="onRegister()" class="login-form">

        <div class="form-group">
          <label>Felhasználónév</label>
          <input
            type="text"
            name="name"
            [(ngModel)]="name"
            placeholder="pl. Barbara"
            autocomplete="name"
            required
          />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="hello@casaflow.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label>Jelszó</label>
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            placeholder="••••••"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="form-group">
          <label>Jelszó megerősítés</label>
          <input
            type="password"
            name="passwordConfirmation"
            [(ngModel)]="passwordConfirmation"
            placeholder="••••••"
            autocomplete="new-password"
            required
          />
        </div>

        <button
          type="submit"
          class="login-button"
          [disabled]="isSubmitting"
        >
          {{ isSubmitting ? 'Folyamatban...' : 'Regisztráció' }}
        </button>

      </form>

      <!-- Hibaüzenet -->
      <p class="message error" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>

      <!-- Sikerüzenet -->
      <p class="message success" *ngIf="successMessage">
        {{ successMessage }}
      </p>

      <p class="login-register">
        Már van fiókod?
        <a routerLink="/login">Vissza a belépéshez</a>
      </p>

    </div>
  </div>

</div>
